<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VAT Tracking System - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ========== MOVING STARRY SKY BACKGROUND ========== */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #020c15, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .mist-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(180, 210, 255, 0.06) 0%, rgba(80, 120, 180, 0.02) 60%, transparent 100%);
            pointer-events: none;
            z-index: 2;
            animation: mistFloatSlow 20s ease-in-out infinite;
        }
        
        .mist-layer-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(45deg, rgba(140, 200, 255, 0.03) 0px, rgba(140, 200, 255, 0.03) 3px, transparent 3px, transparent 20px);
            pointer-events: none;
            z-index: 2;
            animation: mistDriftHorizontal 30s linear infinite;
        }
        
        .mist-layer-3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 60%, rgba(100, 160, 230, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
            animation: mistBreathing 10s ease-in-out infinite;
        }
        
        @keyframes mistFloatSlow {
            0% { opacity: 0.2; transform: scale(1) translateX(0) translateY(0); }
            50% { opacity: 0.55; transform: scale(1.08) translateX(1%) translateY(1%); }
            100% { opacity: 0.2; transform: scale(1) translateX(0) translateY(0); }
        }
        
        @keyframes mistDriftHorizontal {
            0% { transform: translateX(-20%) translateY(-10%) rotate(0deg); opacity: 0.2; }
            50% { transform: translateX(0%) translateY(5%) rotate(1deg); opacity: 0.45; }
            100% { transform: translateX(-20%) translateY(-10%) rotate(0deg); opacity: 0.2; }
        }
        
        @keyframes mistBreathing {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.1); }
        }
        
        .welcome-content {
            text-align: center;
            animation: floatGlow 0.8s ease-out;
            max-width: 85vw;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        
        .welcome-logo {
            width: min(180px, 35vw);
            margin: 0 auto 25px auto;
            filter: drop-shadow(0 0 20px rgba(30,136,229,0.8));
            animation: logoPulse 1.2s infinite alternate;
        }
        
        .welcome-logo img {
            width: 100%;
            border-radius: 35px;
            background: rgba(30,136,229,0.15);
            padding: 12px;
            box-shadow: 0 0 30px rgba(229,57,53,0.5);
        }
        
        .welcome-title {
            font-size: clamp(1.8rem, 7vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #64b5f6, #ff8a80, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: slideUpFade 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .welcome-sub {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: #c6e2ff;
            margin-bottom: 35px;
            opacity: 0;
            animation: fadeInUp 0.6s 0.3s forwards;
            text-shadow: 0 0 10px rgba(30,136,229,0.5);
        }
        
        .start-button {
            background: linear-gradient(145deg, #1e88e5, #e53935);
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 25px rgba(30,136,229,0.6);
            letter-spacing: 2px;
            margin-top: 20px;
            animation: portalGlow 1.8s infinite;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        
        .start-button:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 45px rgba(229,57,53,0.9);
            letter-spacing: 3px;
        }
        
        @keyframes portalGlow {
            0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 20px rgba(30,136,229,0.6); }
            50% { box-shadow: 0 12px 35px rgba(0,0,0,0.5), 0 0 40px rgba(229,57,53,0.8); }
        }
        
        @keyframes floatGlow {
            0% { transform: scale(0.7); opacity: 0; filter: blur(12px);}
            80% { transform: scale(1.02);}
            100% { transform: scale(1); opacity: 1; filter: blur(0);}
        }
        
        @keyframes logoPulse {
            0% { filter: drop-shadow(0 0 5px #1e88e5); transform: scale(0.98);}
            100% { filter: drop-shadow(0 0 28px #e53935); transform: scale(1.02);}
        }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        .audio-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(200,220,255,0.5);
            z-index: 15;
            pointer-events: none;
            white-space: nowrap;
        }
        
        /* Loading spinner while redirecting */
        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        .loading-spinner.active {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner-content {
            text-align: center;
        }
        
        .spinner-circle {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(30,136,229,0.3);
            border-top: 4px solid #e53935;
            border-right: 4px solid #1e88e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner-text {
            color: white;
            font-size: 1rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="welcome-overlay" id="welcomeOverlay">
        <canvas id="starsCanvas" class="stars-canvas"></canvas>
        <div class="mist-layer"></div>
        <div class="mist-layer-2"></div>
        <div class="mist-layer-3"></div>
        <div class="welcome-content">
            <div class="welcome-logo">
                <img src="MGAALogo.jpg" alt="MGAA Logo" onerror="this.src='https://via.placeholder.com/150/1e88e5/ffffff?text=MGAA'">
            </div>
            <div class="welcome-title">VAT TRACKING SYSTEM</div>
            <div class="welcome-sub">Professional Kiosk Dashboard • Smart VAT Compliance</div>
            <button class="start-button" id="startButton">OPEN PORTAL</button>
        </div>
        <div class="audio-hint"><i class="fas fa-volume-up"></i> elevator music</div>
    </div>
    
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-content">
            <div class="spinner-circle"></div>
            <div class="spinner-text">Opening Portal...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ========== MOVING STARRY SKY ANIMATION ==========
            const canvas = document.getElementById('starsCanvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let stars = [];
                let width, height;
                let driftX = 0;
                
                function resizeCanvas() {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    initStars();
                }
                
                function initStars() {
                    stars = [];
                    const starCount = Math.floor((width * height) / 2800);
                    for (let i = 0; i < starCount; i++) {
                        stars.push({
                            x: Math.random() * width * 1.5,
                            y: Math.random() * height,
                            radius: Math.random() * 2.2 + 0.6,
                            alpha: Math.random() * 0.8 + 0.2,
                            twinkleSpeed: 0.3 + Math.random() * 2,
                            phase: Math.random() * Math.PI * 2,
                            parallax: 0.3 + Math.random() * 0.7
                        });
                    }
                }
                
                let time = 0;
                function drawStars() {
                    if (!ctx) return;
                    ctx.clearRect(0, 0, width, height);
                    time += 0.018;
                    driftX = (driftX + 0.15) % (width * 0.5);
                    
                    for (let star of stars) {
                        const twinkle = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(time * star.twinkleSpeed + star.phase));
                        const opacity = Math.min(1, star.alpha * twinkle);
                        let driftOffset = (driftX * star.parallax) % (width * 1.2);
                        let starX = (star.x + driftOffset) % (width * 1.2);
                        if (starX > width) starX = starX - width;
                        
                        ctx.beginPath();
                        ctx.arc(starX, star.y, star.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 245, 210, ${opacity * 0.95})`;
                        ctx.fill();
                        
                        if (opacity > 0.7 && star.radius > 1.2) {
                            ctx.shadowBlur = 6;
                            ctx.shadowColor = `rgba(255, 200, 120, ${opacity * 0.5})`;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }
                    requestAnimationFrame(drawStars);
                }
                
                window.addEventListener('resize', () => resizeCanvas());
                resizeCanvas();
                drawStars();
            }
            
            // ========== MUSIC PLAYER FOR elevator.mp3 ==========
            let audioPlayer = null;
            
            function playElevatorMusic() {
                if (audioPlayer) {
                    if (!audioPlayer.paused) return;
                    audioPlayer.currentTime = 0;
                    audioPlayer.play().catch(e => console.log("Audio play failed:", e));
                    return;
                }
                audioPlayer = new Audio('startup.mp3');
                audioPlayer.loop = true;
                audioPlayer.volume = 0.5;
                audioPlayer.play().catch(e => {
                    console.log("Auto-play may be blocked. User interaction should allow playback.");
                });
            }
            
            // ========== REDIRECT TO DASHBOARD WITH MUSIC ==========
            const startButton = document.getElementById('startButton');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const welcomeOverlay = document.getElementById('welcomeOverlay');
            
            function redirectToDashboard() {
                // Play elevator music
                playElevatorMusic();
                
                // Show loading spinner
                loadingSpinner.classList.add('active');
                
                // Fade out welcome content smoothly
                const welcomeContent = document.querySelector('.welcome-content');
                if (welcomeContent) {
                    welcomeContent.style.transition = 'opacity 0.5s ease';
                    welcomeContent.style.opacity = '0';
                }
                
                // Small delay to let the fade effect play, then redirect
                setTimeout(() => {
                    window.location.href = 'index2.html';
                }, 600);
            }
            
            if (startButton) {
                startButton.addEventListener('click', redirectToDashboard);
            }
            
            // Optional: Preload dashboard for faster navigation
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = 'index2.html';
            document.head.appendChild(link);
        });
    </script>
</body>
</html>
